    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const counter = document.getElementById('wasteCounter');
            const searchInput = document.querySelector('input');

            // 1. Simulate the dynamic counter
            const finalNumber = 142; 
            let startNumber = 0;
            const duration = 1200; // 1.2 seconds
            const stepTime = Math.abs(Math.floor(duration / finalNumber));

            const timer = setInterval(() => {
                startNumber += 1;
                counter.innerText = `${startNumber} tons`;
                if (startNumber === finalNumber) {
                    clearInterval(timer);
                }
            }, stepTime);

            // 2. Add an effect to the search input on focus
            searchInput.addEventListener('focus', () => {
                searchInput.parentElement.parentElement.classList.add('border-brand-leaf', 'shadow-2xl');
            });
            searchInput.addEventListener('blur', () => {
                searchInput.parentElement.parentElement.classList.remove('border-brand-leaf', 'shadow-2xl');
            });
        });
    </script>
