<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Name | Scan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            sky: '#B3C8E1',
                            leaf: '#416D41',
                            sun: '#FBF5AE',
                            text: '#FFFFFF',
                            card: '#E9E298',
                            darkText: '#5A4A33',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(233, 226, 152, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        #video-container {
            mask-image: radial-gradient(white, black); /* Fix for overflow hidden on some mobile browsers */
        }
    </style>
</head>
<body class="m-0 p-0 font-sans bg-brand-sky/20 min-h-screen">

    <div class="fixed inset-0 bg-cover bg-center bg-no-repeat -z-10" 
         style="background-image: url('https://images.pexels.com/photos/1571460/pexels-photo-1571460.jpeg?auto=compress&cs=tinysrgb&w=1600'); filter: opacity(0.2) grayscale(20%);">
    </div>

    <header class="w-full h-24 bg-brand-sky bg-opacity-90 backdrop-blur-md flex items-center px-12 z-50 sticky top-0 shadow-sm">
        <div onclick="window.location.href='/';" style="cursor: pointer;" class="flex items-center gap-4">
            <img class="w-12 h-auto object-contain flex-shrink-0" src="/assets/logo.png" alt="Logo">
            <h1 class="text-3xl font-extrabold tracking-tight text-brand-darkText">Product Name</h1>
        </div>
        <nav class="ml-auto flex items-center gap-10">
            <a href="/marketplace" class="text-lg font-bold text-brand-darkText hover:text-brand-leaf transition">Marketplace</a>
            <a href="/impact" class="text-lg font-bold text-brand-darkText hover:text-brand-leaf transition">Impact</a>
            <button class="bg-brand-darkText text-white text-lg font-bold px-8 py-3 rounded-full">Akbar's Profile</button>
        </nav>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="flex flex-col lg:flex-row gap-12 items-start">
            
            <div class="w-full lg:w-7/12">
                <div class="relative rounded-[3rem] overflow-hidden shadow-2xl border-8 border-white bg-black aspect-square lg:aspect-video" id="video-container">
                    <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
                    
                    <div class="absolute inset-0 flex flex-col justify-between p-8 pointer-events-none">
                        <div class="flex justify-between items-start">
                            <span class="bg-brand-leaf text-white px-4 py-1 rounded-full text-xs font-black uppercase tracking-tighter">Live Scanner</span>
                        </div>
                        <div class="flex justify-center pointer-events-auto">
                            <button id="capture-btn" class="bg-white text-brand-darkText hover:bg-brand-sun p-6 rounded-full shadow-2xl transition-all transform hover:scale-110 active:scale-95 group">
                                <div class="w-12 h-12 flex items-center justify-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-8 h-8">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" />
                                    </svg>
                                </div>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full lg:w-5/12">
                <div id="placeholder-text" class="glass rounded-[3rem] p-12 text-center space-y-4 h-full flex flex-col justify-center border-dashed border-4 border-brand-darkText/20">
                    <div class="text-6xl">📸</div>
                    <h3 class="text-3xl font-black text-brand-darkText">Ready to Scan?</h3>
                    <p class="text-brand-darkText/60 font-medium">Place your item in the frame and hit the camera button to generate upcycling ideas.</p>
                </div>

                <div id="loading" class="hidden glass rounded-[3rem] p-12 text-center animate-pulse">
                    <div class="flex flex-col items-center gap-6">
                        <div class="w-16 h-16 border-4 border-brand-leaf border-t-transparent rounded-full animate-spin"></div>
                        <p class="text-2xl font-black text-brand-darkText">Gemini is analyzing...</p>
                    </div>
                </div>

                <div id="results" class="hidden glass rounded-[3rem] p-10 space-y-6 shadow-2xl">
                    <div class="pb-6 border-b border-brand-darkText/10">
                        <span class="text-brand-leaf font-black uppercase text-sm tracking-widest">Item Identified</span>
                        <h3 id="item-name" class="text-5xl font-black text-brand-darkText mt-2">Plastic Bottle</h3>
                    </div>
                    
                    <div class="space-y-4">
                        <h4 class="text-xl font-bold text-brand-darkText flex items-center gap-2">
                            <span>✨</span> Upcycling Crafts
                        </h4>
                        <div id="craft-list" class="space-y-3">
                            </div>
                    </div>

                    <button onclick="window.location.reload()" class="w-full bg-brand-darkText text-white font-bold py-4 rounded-2xl hover:bg-brand-leaf transition">
                        Scan Something Else
                    </button>
                </div>
            </div>

        </div>
    </main>

    <canvas id="canvas" class="hidden"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture-btn');
        const resultsCard = document.getElementById('results');
        const loadingCard = document.getElementById('loading');
        const placeholder = document.getElementById('placeholder-text');
        const itemName = document.getElementById('item-name');
        const craftList = document.getElementById('craft-list');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch (err) {
                console.error("Camera error:", err);
                alert("Please enable camera access to scan trash.");
            }
        }

        captureBtn.addEventListener('click', async () => {
            placeholder.classList.add('hidden');
            resultsCard.classList.add('hidden');
            loadingCard.classList.remove('hidden');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('file', blob, 'image.png');

                try {
                    const response = await fetch('/api/classify', { method: 'POST', body: formData });
                    const data = await response.json();
                    console.log(response)
                    // Populate UI
                    itemName.innerText = data.item;
                    craftList.innerHTML = '';
                    data.craft_ideas.forEach(idea => {
                        const div = document.createElement('div');
                        div.className = "p-4 bg-white/60 rounded-2xl text-brand-darkText font-medium border border-white/40 shadow-sm";
                        div.innerText = idea;
                        craftList.appendChild(div);
                    });

                    loadingCard.classList.add('hidden');
                    resultsCard.classList.remove('hidden');
                } catch (e) {
                    alert("API Error: Check console.");
                    console.error(e);
                }
            }, 'image/png');
        });

        initCamera();
    </script>
</body>
</html>
